<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MonoCapVRM</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>MonoCapVRM</h1>
        <span id="status" class="loading">初期化中...</span>
      </header>

      <main>
        <div class="panel">
          <span class="panel-label">カメラ映像</span>
          <div class="view-toggle">
            <button id="btn-view-camera" class="view-btn">カメラ</button>
            <button id="btn-view-skeleton" class="view-btn active">骨格</button>
          </div>
          <button id="btn-camera" title="カメラ: OFF"><i class="fa-solid fa-video-slash"></i></button>
          <video id="camera-video" autoplay playsinline muted></video>
          <canvas id="preview-canvas"></canvas>
        </div>
        <div class="panel">
          <span class="panel-label">3D モデル</span>
          <button id="btn-load-vrm" title="VRM 読み込み"><i class="fa-solid fa-file-import"></i></button>
          <div id="vrm-load-popup">
            <button id="vlp-file"><i class="fa-solid fa-folder-open"></i>&nbsp;ファイルを選択</button>
            <div id="vlp-divider"></div>
            <div id="vlp-server-list"></div>
          </div>
          <canvas id="vrm-canvas"></canvas>
          <div id="bg-popup">
            <button id="bp-none" class="active">なし</button>
            <button id="bp-color">単色</button>
            <button id="bp-color-swatch" style="display:none" title="色を変更"></button>
            <input id="bp-color-input" type="color" value="#ffffff">
            <button id="bp-image">画像</button>
          </div>
          <div class="panel-controls">
            <button id="btn-capture" disabled title="スクリーンショット"><i class="fa-solid fa-camera"></i></button>
            <button id="btn-reset-view" title="視点リセット"><i class="fa-solid fa-arrows-rotate"></i></button>
            <button id="btn-mirror" class="active" title="ミラーリング: ON"><i class="fa-solid fa-left-right"></i></button>
            <button id="btn-bg-image" title="背景設定"><i class="fa-solid fa-image"></i></button>
            <button id="btn-fullscreen" title="全画面表示"><i class="fa-solid fa-expand"></i></button>
          </div>
          <span id="fps"></span>
          <input id="vrm-file-input" type="file" accept=".vrm" />
          <input id="bg-image-input" type="file" accept="image/*" />
        </div>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
