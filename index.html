<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MonoCapVRM</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #1a1a2e; color: #fff; font-family: sans-serif; overflow: hidden; }

      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 16px;
        background: rgba(255,255,255,0.05);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        z-index: 10;
      }

      header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.05em; }

      #status {
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 9999px;
        background: rgba(255,255,255,0.1);
      }
      #status.ready   { background: #16a34a33; color: #4ade80; }
      #status.loading { background: #d9770633; color: #fbbf24; }
      #status.error   { background: #dc262633; color: #f87171; }

      main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr;
        gap: 8px;
        padding: 8px;
        min-height: 0;
      }

      .panel {
        position: relative;
        border-radius: 8px;
        overflow: hidden;
        background: #000;
      }

      .panel-label {
        position: absolute;
        top: 8px;
        left: 8px;
        font-size: 11px;
        background: rgba(0,0,0,0.6);
        padding: 2px 8px;
        border-radius: 4px;
        z-index: 5;
      }

      .view-toggle {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 2px;
        z-index: 5;
      }

      .view-btn {
        padding: 2px 10px;
        font-size: 11px;
        background: rgba(0,0,0,0.5);
        color: rgba(255,255,255,0.5);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.15s;
        font-weight: 500;
      }
      .view-btn:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
      .view-btn.active { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.4); }

      #camera-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }

      #preview-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
      }

      #vrm-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      button {
        padding: 6px 16px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: opacity 0.2s;
      }
      button:hover { opacity: 0.85; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }

      #btn-camera {
        position: absolute;
        top: 8px;
        right: 8px;
        z-index: 5;
        background: #3b82f6;
        color: #fff;
      }

      #btn-load-vrm {
        position: absolute;
        top: 8px;
        right: 8px;
        z-index: 5;
        background: #8b5cf6;
        color: #fff;
      }

      #btn-capture  { background: #10b981; color: #fff; }
      #btn-reset-view { background: #475569; color: #fff; }
      #btn-mirror { background: #475569; color: #fff; }
      #btn-mirror.active { background: #0ea5e9; }
      #btn-fullscreen { background: #475569; color: #fff; }
      #btn-bg-image { background: #475569; color: #fff; }
      #btn-bg-image.active { background: #f59e0b; }

      #btn-camera, #btn-load-vrm, #btn-capture, #btn-reset-view, #btn-mirror, #btn-fullscreen, #btn-bg-image {
        width: 36px;
        height: 36px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
      }

      .panel-controls {
        position: absolute;
        bottom: 8px;
        left: 8px;
        display: flex;
        gap: 4px;
        z-index: 5;
      }

      #fps {
        position: absolute;
        bottom: 8px;
        right: 8px;
        font-size: 11px;
        color: rgba(255,255,255,0.4);
        z-index: 5;
      }

      #vrm-file-input { display: none; }
      #bg-image-input { display: none; }

      #bg-popup {
        position: absolute;
        bottom: 52px;
        left: 8px;
        background: rgba(10,10,22,0.93);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 8px;
        padding: 6px 8px;
        display: none;
        align-items: center;
        gap: 4px;
        z-index: 10;
        white-space: nowrap;
      }
      #bg-popup.open { display: flex; }
      #bg-popup button {
        width: auto;
        height: 26px;
        padding: 0 10px;
        font-size: 11px;
        font-weight: 500;
        background: rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.65);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        opacity: 1;
      }
      #bg-popup button:hover { opacity: 1; color: #fff; background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
      #bg-popup button.active { background: rgba(255,255,255,0.22); color: #fff; border-color: rgba(255,255,255,0.4); }
      #bg-popup #bp-color-swatch {
        width: 22px;
        height: 22px;
        padding: 0;
        border: 2px solid rgba(255,255,255,0.35);
        border-radius: 4px;
      }
      #bp-color-input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        pointer-events: none;
      }

      .panel:fullscreen {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
      }
      .panel:-webkit-full-screen {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>MonoCapVRM</h1>
        <span id="status" class="loading">初期化中...</span>
      </header>

      <main>
        <div class="panel">
          <span class="panel-label">カメラ映像</span>
          <div class="view-toggle">
            <button id="btn-view-camera" class="view-btn">カメラ</button>
            <button id="btn-view-skeleton" class="view-btn active">骨格</button>
          </div>
          <button id="btn-camera" title="カメラ: OFF"><i class="fa-solid fa-video-slash"></i></button>
          <video id="camera-video" autoplay playsinline muted></video>
          <canvas id="preview-canvas"></canvas>
        </div>
        <div class="panel">
          <span class="panel-label">3D モデル</span>
          <button id="btn-load-vrm" title="VRM 読み込み"><i class="fa-solid fa-file-import"></i></button>
          <canvas id="vrm-canvas"></canvas>
          <div id="bg-popup">
            <button id="bp-none" class="active">なし</button>
            <button id="bp-color">単色</button>
            <button id="bp-color-swatch" style="display:none" title="色を変更"></button>
            <input id="bp-color-input" type="color" value="#ffffff">
            <button id="bp-image">画像</button>
          </div>
          <div class="panel-controls">
            <button id="btn-capture" disabled title="スクリーンショット"><i class="fa-solid fa-camera"></i></button>
            <button id="btn-reset-view" title="視点リセット"><i class="fa-solid fa-arrows-rotate"></i></button>
            <button id="btn-mirror" class="active" title="ミラーリング: ON"><i class="fa-solid fa-left-right"></i></button>
            <button id="btn-bg-image" title="背景設定"><i class="fa-solid fa-image"></i></button>
            <button id="btn-fullscreen" title="全画面表示"><i class="fa-solid fa-expand"></i></button>
          </div>
          <span id="fps"></span>
          <input id="vrm-file-input" type="file" accept=".vrm" />
          <input id="bg-image-input" type="file" accept="image/*" />
        </div>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
